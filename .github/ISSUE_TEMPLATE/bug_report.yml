name: Bug report
description: Report a problem with xsoar-mcp
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report!
        **Do not include API keys, tokens, or production URLs** in this report.

  - type: input
    id: version
    attributes:
      label: xsoar-mcp version
      description: Output of `pip show xsoar-mcp` or commit hash.
      placeholder: "0.2.0"
    validations:
      required: true

  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: "3.12.1"
    validations:
      required: true

  - type: input
    id: xsoar-version
    attributes:
      label: XSOAR version
      placeholder: "6.10.0 build 12345"
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: Which component?
      options:
        - MCP server (tools/resources/prompts)
        - Python CLI agent (examples/agent.py)
        - PowerShell agent (xsoar-agent.ps1)
        - Docker
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: What did you do? What did you expect to happen? What actually happened?
      placeholder: |
        1. Run `xsoar-mcp` with ...
        2. Call tool `search_incidents` with ...
        3. Observed error: ...
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant log output
      description: Run with `XSOAR_DEBUG=true` for verbose logs. Redact any secrets.
      render: shell

  - type: textarea
    id: additional
    attributes:
      label: Additional context
